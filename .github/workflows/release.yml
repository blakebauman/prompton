name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach (e.g. v0.1.2). Leave empty to use the push tag."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native Apple Silicon (matches macos-latest today).
          - platform: macos-latest
            args: ""
          # Linux x64 .deb + AppImage (webkit2gtk 4.1).
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$TAG" =~ ^v ]]; then
            echo "Tag must start with v (got: $TAG)"
            exit 1
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Check package.json version matches tag
        shell: bash
        run: |
          PKG="$(jq -r .version package.json)"
          WANT="${{ steps.tag.outputs.version }}"
          if [ "$PKG" != "$WANT" ]; then
            echo "Version mismatch: package.json=$PKG tag=${{ steps.tag.outputs.name }} (expected package.json=$WANT)"
            echo "Run: pnpm run version $WANT && commit before tagging."
            exit 1
          fi

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Check versions match
        run: pnpm run version:check

      # Only export APPLE_* when configured. Empty strings still make Tauri try
      # `security import` and fail the macOS bundle step.
      - name: Enable Apple signing when configured
        if: matrix.platform == 'macos-latest'
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID_VALUE: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_VALUE: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID_VALUE: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          if [ -z "$CERT" ] || [ -z "$APPLE_ID_VALUE" ]; then
            echo "Apple Developer ID secrets missing — ad-hoc macOS signing."
            exit 0
          fi
          {
            echo "APPLE_CERTIFICATE<<CERT_EOF"
            echo "$CERT"
            echo "CERT_EOF"
            echo "APPLE_CERTIFICATE_PASSWORD=$CERT_PASSWORD"
            echo "APPLE_SIGNING_IDENTITY=$IDENTITY"
            echo "APPLE_ID=$APPLE_ID_VALUE"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD_VALUE"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID_VALUE"
          } >> "$GITHUB_ENV"
          echo "Apple Developer ID secrets present — signing + notarization enabled."

      - name: Build and upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater artifact signatures (minisign). Required for in-app updates.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: Prompton ${{ steps.tag.outputs.name }}
          releaseBody: |
            Automated packaging for `${{ steps.tag.outputs.name }}`.

            **Dialects:** PostgreSQL, MySQL, SQLite.
            **Updates:** in-app updater reads `latest.json` from this release (Tauri minisign key).

            ### macOS
            With `APPLE_*` repository secrets configured: Developer ID signed + notarized.
            Without them: **ad-hoc signed** — first launch right-click → **Open**, or `xattr -cr /Applications/Prompton.app`.

            ### Linux
            x86_64 `.deb` + AppImage (+ rpm). Windows packaging is deferred.
          releaseDraft: false
          includeUpdaterJson: true
          prerelease: ${{ contains(steps.tag.outputs.name, 'alpha') || contains(steps.tag.outputs.name, 'beta') || contains(steps.tag.outputs.name, 'rc') }}
          args: ${{ matrix.args }}