name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach (e.g. v0.1.1). Leave empty to use the push tag."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native Apple Silicon (matches macos-latest today).
          - platform: macos-latest
            args: ""
          # Linux x64 .deb + AppImage (webkit2gtk 4.1).
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$TAG" =~ ^v ]]; then
            echo "Tag must start with v (got: $TAG)"
            exit 1
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Check package.json version matches tag
        shell: bash
        run: |
          PKG="$(jq -r .version package.json)"
          WANT="${{ steps.tag.outputs.version }}"
          if [ "$PKG" != "$WANT" ]; then
            echo "Version mismatch: package.json=$PKG tag=${{ steps.tag.outputs.name }} (expected package.json=$WANT)"
            echo "Run: pnpm run version $WANT && commit before tagging."
            exit 1
          fi

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Check versions match
        run: pnpm run version:check

      - name: Build and upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: Prompton ${{ steps.tag.outputs.name }}
          releaseBody: |
            Automated packaging for `${{ steps.tag.outputs.name }}`.

            macOS builds are **ad-hoc signed** (not Apple notarized / Developer ID).
            First launch: right-click the app → **Open**, or run `xattr -cr /Applications/Prompton.app`.
            Linux is x86_64 `.deb` + AppImage. Windows packaging is deferred.

            In-app updates read `latest.json` from this release (signed with the updater key).
          releaseDraft: false
          includeUpdaterJson: true
          prerelease: ${{ contains(steps.tag.outputs.name, 'alpha') || contains(steps.tag.outputs.name, 'beta') || contains(steps.tag.outputs.name, 'rc') }}
          args: ${{ matrix.args }}
